<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SecureSpace Call Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ─── SecureSpace palette (mirrors transitions-dashboard app.css) ─── */
  :root, [data-theme="dark"] {
    --bg:#0c1120; --surface:#111827; --card:#1a2235;
    --border-color:#283044; --border-hover:#374151;
    --primary:#1f4a9a; --primary-hover:#163d80; --primary-dim:rgba(31,74,154,.15);
    --info:#4182c3; --cta:#5ec28f; --cta-hover:#6fd49f; --cta-dim:rgba(94,194,143,.15);
    --green:#5ec28f; --green-dim:rgba(94,194,143,.12);
    --orange:#fb923c; --orange-dim:rgba(251,146,60,.12);
    --red:#c34141; --red-dim:rgba(195,65,65,.12);
    --yellow:#ffd600; --yellow-dim:rgba(255,214,0,.12);
    --text:#e8eaf0; --muted:#8893a7; --muted-dark:#6b7280;
    --shadow:0 2px 8px rgba(0,0,0,.4); --shadow-hover:0 4px 24px rgba(0,0,0,.3);
  }
  [data-theme="light"] {
    --bg:#f5f6fa; --surface:#fff; --card:#fff;
    --border-color:#d5dae3; --border-hover:#c5cad3;
    --primary:#1f4a9a; --primary-hover:#163d80; --primary-dim:rgba(31,74,154,.1);
    --info:#4182c3; --cta:#22a331; --cta-hover:#1a8a28; --cta-dim:rgba(34,163,49,.08);
    --green:#22a331; --green-dim:rgba(34,163,49,.08);
    --orange:#ea580c; --orange-dim:rgba(234,88,12,.08);
    --red:#c34141; --red-dim:rgba(195,65,65,.08);
    --yellow:#ca8a04; --yellow-dim:rgba(202,138,4,.08);
    --text:#1f2937; --muted:#6b7280; --muted-dark:#9ca3af;
    --shadow:0 1px 3px rgba(0,0,0,.08); --shadow-hover:0 4px 12px rgba(0,0,0,.1);
  }

  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:'Open Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:14px; line-height:1.45; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border-hover); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--muted-dark); }

  /* ─── Header ─── */
  header { display:flex; align-items:center; gap:18px; padding:14px 22px;
    background:var(--surface); border-bottom:1px solid var(--border-color); position:sticky; top:0; z-index:10; }
  header .brand { display:flex; align-items:center; gap:10px; }
  header .brand img { height:26px; width:auto; display:block; }
  header .brand img.light-only { display:none; }
  [data-theme="light"] header .brand img.dark-only { display:none; }
  [data-theme="light"] header .brand img.light-only { display:block; }
  header h1 { margin:0; font-size:15px; font-weight:700; letter-spacing:.2px; }
  header h1 .dot { color:var(--primary); }
  header h1 .sub { color:var(--muted); font-weight:400; font-size:12px; margin-left:6px; }
  .search { flex:1; max-width:560px; position:relative; }
  .search input { width:100%; padding:10px 14px 10px 38px; background:var(--card);
    border:1px solid var(--border-color); border-radius:8px; color:var(--text); font-size:14px; outline:none;
    font-family:inherit; transition:border-color .15s; }
  .search input:focus { border-color:var(--primary); }
  .search::before { content:"⌕"; position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); }
  .tabs { display:flex; gap:4px; }
  .tab-btn { padding:8px 14px; background:transparent; color:var(--muted);
    border:1px solid var(--border-color); border-radius:8px; cursor:pointer; font-size:13px; font-family:inherit;
    transition:all .15s; }
  .tab-btn:hover { border-color:var(--border-hover); color:var(--text); }
  .tab-btn.active { background:var(--primary-dim); color:var(--text); border-color:var(--primary); }
  .theme-toggle { background:transparent; border:1px solid var(--border-color); color:var(--muted);
    border-radius:8px; padding:8px 10px; cursor:pointer; font-size:14px; }
  .theme-toggle:hover { color:var(--text); border-color:var(--border-hover); }

  /* ─── Layout ─── */
  main { display:grid; grid-template-columns:320px 1fr; height:calc(100vh - 58px); }
  .sidebar { border-right:1px solid var(--border-color); overflow:auto; background:var(--surface); }
  .content { overflow:auto; padding:24px 28px; }
  .empty { color:var(--muted); text-align:center; margin-top:20vh; font-size:14px; }

  /* ─── Toolbar (collapse/expand controls) ─── */
  .toolbar { display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:10px 14px; background:var(--surface); border-bottom:1px solid var(--border-color);
    position:sticky; top:0; z-index:2; }
  .toolbar .label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.1em; font-weight:600; }
  .toolbar .actions { display:flex; gap:6px; }
  .mini-btn { background:transparent; border:1px solid var(--border-color); color:var(--muted);
    border-radius:6px; padding:5px 10px; font-size:11px; cursor:pointer; font-family:inherit;
    text-transform:uppercase; letter-spacing:.06em; font-weight:600; transition:all .15s; }
  .mini-btn:hover { color:var(--text); border-color:var(--primary); background:var(--primary-dim); }
  .profile-toolbar { margin:0 0 16px; display:flex; justify-content:flex-end; gap:6px; }

  /* ─── Collapsible group (sidebar) ─── */
  .group { background:var(--card); border-bottom:1px solid var(--border-color); position:sticky; top:0; z-index:1; }
  .group-header { display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:10px 14px; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.12em;
    cursor:pointer; user-select:none; }
  .group-header:hover { color:var(--text); }
  .group-header .chev { transition:transform .15s; display:inline-block; font-size:10px; color:var(--muted); }
  .group.collapsed .chev { transform:rotate(-90deg); }
  .group.collapsed + .group-body { display:none; }
  .group-count { background:var(--primary-dim); color:var(--info); padding:1px 7px; border-radius:10px; font-size:10px; font-weight:600; }

  .row { display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:10px 14px; border-bottom:1px solid var(--border-color); cursor:pointer; transition:background .1s; }
  .row:hover { background:var(--card); }
  .row.active { background:var(--primary-dim); border-left:3px solid var(--primary); padding-left:11px; }
  .row .code { color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; }
  .row .meta { color:var(--muted); font-size:11px; margin-top:2px; }

  /* ─── Profile ─── */
  .profile h2 { margin:0 0 4px; font-size:22px; font-weight:700; }
  .profile h2 .code-inline { color:var(--muted); font-size:15px; font-weight:400; font-family:'DM Mono',monospace; margin-left:8px; }
  .profile .subtitle { color:var(--muted); font-size:13px; margin-bottom:18px; }

  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; margin-bottom:22px; }
  .card { background:var(--card); border:1px solid var(--border-color); border-radius:8px; padding:14px 16px; box-shadow:var(--shadow); }
  .card h4 { margin:0 0 8px; font-size:11px; font-weight:600; color:var(--muted);
    text-transform:uppercase; letter-spacing:.1em; }
  .card .big { font-size:15px; color:var(--text); }
  .card a { color:var(--info); text-decoration:none; }
  .card a:hover { color:var(--primary); }
  .hours { white-space:pre-line; font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); line-height:1.6; }

  /* ─── Collapsible section ─── */
  details.section { margin-top:20px; background:var(--card); border:1px solid var(--border-color);
    border-radius:8px; box-shadow:var(--shadow); overflow:hidden; }
  details.section[open] { box-shadow:var(--shadow-hover); }
  details.section > summary { list-style:none; cursor:pointer; padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; user-select:none; }
  details.section > summary::-webkit-details-marker { display:none; }
  details.section > summary h3 { margin:0; font-size:12px; font-weight:700; color:var(--text);
    letter-spacing:.12em; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  details.section > summary h3 .chev { font-size:10px; color:var(--muted); transition:transform .15s; }
  details.section[open] > summary h3 .chev { transform:rotate(90deg); }
  details.section > summary .count { color:var(--muted); font-size:12px; font-family:'DM Mono',monospace; }
  details.section > .section-body { padding:0 18px 18px; border-top:1px solid var(--border-color); padding-top:16px; }

  /* ─── People cards ─── */
  .people { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:10px; }
  .person { background:var(--surface); border:1px solid var(--border-color); border-radius:8px;
    padding:12px 14px; display:flex; gap:12px; transition:border-color .15s, box-shadow .15s; }
  .person:hover { border-color:var(--border-hover); box-shadow:var(--shadow); }
  .avatar { width:36px; height:36px; border-radius:50%;
    background:linear-gradient(135deg,var(--primary),var(--info)); color:#fff;
    font-weight:700; font-size:13px; display:grid; place-items:center; flex-shrink:0; }
  .person .name { font-weight:600; font-size:14px; }
  .person .role { color:var(--muted); font-size:12px; margin-top:2px; }
  .person .contact { margin-top:6px; display:flex; gap:10px; flex-wrap:wrap; font-size:12px; }
  .person .contact a { color:var(--info); text-decoration:none; }
  .person .contact a:hover { color:var(--primary); }
  .person.tag-temp { border-color:var(--orange); background:var(--orange-dim); }
  .person.tag-multi { border-color:var(--cta); background:var(--cta-dim); }

  .badge { display:inline-block; padding:2px 8px; font-size:10px; border-radius:10px;
    text-transform:uppercase; letter-spacing:.08em; font-weight:600; margin-left:6px; vertical-align:middle; }
  .badge.temp { background:var(--orange-dim); color:var(--orange); }
  .badge.multi { background:var(--cta-dim); color:var(--cta); }

  /* ─── Org chart ─── */
  .org { display:flex; flex-direction:column; gap:16px; }
  details.tier { background:var(--card); border:1px solid var(--border-color); border-radius:8px;
    box-shadow:var(--shadow); overflow:hidden; }
  details.tier > summary { list-style:none; cursor:pointer; padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between; user-select:none; }
  details.tier > summary::-webkit-details-marker { display:none; }
  details.tier > summary h3 { margin:0; font-size:13px; font-weight:700; color:var(--primary);
    letter-spacing:.1em; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  details.tier > summary h3 .chev { color:var(--muted); font-size:10px; transition:transform .15s; }
  details.tier[open] > summary h3 .chev { transform:rotate(90deg); }
  details.tier > .tier-body { padding:0 18px 16px; border-top:1px solid var(--border-color); padding-top:14px; }
  .nodes { display:flex; flex-wrap:wrap; gap:8px; }
  .node { background:var(--surface); border:1px solid var(--border-color); border-radius:999px;
    padding:6px 14px; font-size:13px; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:6px; }
  .node:hover { border-color:var(--primary); color:var(--text); background:var(--primary-dim); }
  .node .sm { color:var(--muted); font-size:11px; }

  /* ─── Role switcher + admin UI ─── */
  .role-pill { display:inline-flex; align-items:center; gap:6px; background:var(--card);
    border:1px solid var(--border-color); border-radius:999px; padding:4px 10px 4px 8px; font-size:11px; color:var(--muted); }
  .role-pill select { background:transparent; border:none; color:var(--text); font-family:inherit;
    font-size:11px; font-weight:600; outline:none; cursor:pointer; text-transform:uppercase; letter-spacing:.08em; }
  .role-dot { width:8px; height:8px; border-radius:50%; background:var(--cta); }
  .role-dot.viewer { background:var(--muted); }
  .role-dot.power  { background:var(--info); }
  .role-dot.admin  { background:var(--red); }
  .tab-btn[data-tab="manage"] { border-color:var(--red); color:var(--red); }
  .tab-btn[data-tab="manage"].active { background:var(--red-dim); color:var(--text); }
  .locked-notice { background:var(--orange-dim); color:var(--orange); border:1px solid var(--orange);
    border-radius:8px; padding:14px 18px; margin-bottom:16px; font-size:13px; display:flex; gap:10px; align-items:center; }

  /* ─── Manage / bulk tools ─── */
  .manage-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:14px; }
  .tool-card { background:var(--card); border:1px solid var(--border-color); border-radius:10px;
    padding:18px 20px; box-shadow:var(--shadow); cursor:pointer; transition:all .15s; }
  .tool-card:hover { border-color:var(--primary); box-shadow:var(--shadow-hover); transform:translateY(-1px); }
  .tool-card h3 { margin:0 0 8px; font-size:15px; font-weight:700; color:var(--text); }
  .tool-card .desc { color:var(--muted); font-size:13px; line-height:1.5; }
  .tool-card .icon { width:36px; height:36px; border-radius:8px; background:var(--primary-dim);
    color:var(--info); display:grid; place-items:center; font-size:18px; margin-bottom:12px; }

  /* ─── Modal ─── */
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; display:none;
    align-items:flex-start; justify-content:center; padding:60px 20px; overflow:auto; }
  .modal-backdrop.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border-color); border-radius:10px;
    box-shadow:var(--shadow-hover); width:100%; max-width:720px; padding:0; overflow:hidden; }
  .modal-head { padding:16px 20px; border-bottom:1px solid var(--border-color); display:flex;
    justify-content:space-between; align-items:center; }
  .modal-head h3 { margin:0; font-size:16px; font-weight:700; }
  .modal-head .close { background:transparent; border:none; color:var(--muted); font-size:22px; cursor:pointer; }
  .modal-body { padding:20px; max-height:60vh; overflow:auto; }
  .modal-foot { padding:14px 20px; border-top:1px solid var(--border-color); display:flex; justify-content:flex-end; gap:8px; }

  .form-row { display:grid; grid-template-columns:140px 1fr; gap:12px; align-items:center; margin-bottom:12px; }
  .form-row label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; font-weight:600; }
  .form-row input, .form-row select, .form-row textarea { width:100%; padding:8px 10px;
    background:var(--card); border:1px solid var(--border-color); border-radius:6px;
    color:var(--text); font-family:inherit; font-size:13px; outline:none; }
  .form-row input:focus, .form-row select:focus { border-color:var(--primary); }
  .form-row textarea { min-height:80px; font-family:'DM Mono',monospace; font-size:12px; }

  .btn { padding:8px 14px; border-radius:6px; font-family:inherit; font-size:13px; font-weight:600;
    cursor:pointer; border:1px solid var(--border-color); background:var(--card); color:var(--text); transition:all .15s; }
  .btn:hover { border-color:var(--primary); }
  .btn.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
  .btn.primary:hover { background:var(--primary-hover); }
  .btn.danger { background:var(--red); border-color:var(--red); color:#fff; }
  .btn.danger:hover { background:#a53535; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }

  .checkbox-list { max-height:320px; overflow:auto; border:1px solid var(--border-color);
    border-radius:6px; background:var(--card); }
  .checkbox-list .cl-head,
  .checkbox-list label {
    display:grid;
    grid-template-columns:24px 72px 1fr 56px;
    align-items:center;
    gap:12px;
    padding:8px 14px;
    font-size:13px;
    border-bottom:1px solid var(--border-color);
  }
  .checkbox-list .cl-head { position:sticky; top:0; background:var(--surface);
    color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.08em; font-weight:600; z-index:1; }
  .checkbox-list label { cursor:pointer; }
  .checkbox-list label:last-child { border-bottom:none; }
  .checkbox-list label:hover { background:var(--primary-dim); }
  .checkbox-list label input { margin:0; width:16px; height:16px; cursor:pointer; accent-color:var(--primary); }
  .checkbox-list .cl-code { color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; }
  .checkbox-list .cl-name { color:var(--text); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .checkbox-list .cl-state { color:var(--muted); font-size:11px; font-family:'DM Mono',monospace; text-align:right; }
  .checkbox-list label.checked { background:var(--primary-dim); }

  .diff-row { display:grid; grid-template-columns:1fr 24px 1fr; gap:10px; padding:8px 12px;
    border-bottom:1px solid var(--border-color); font-size:13px; align-items:center; }
  .diff-row:last-child { border-bottom:none; }
  .diff-row .old { color:var(--red); text-decoration:line-through; }
  .diff-row .arr { color:var(--muted); text-align:center; }
  .diff-row .new { color:var(--green); font-weight:600; }

  .edit-btn { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:13px;
    padding:4px 6px; border-radius:4px; opacity:0; transition:opacity .15s; }
  .person:hover .edit-btn { opacity:1; }
  .edit-btn:hover { color:var(--primary); background:var(--primary-dim); }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img class="dark-only" src="assets/logo-white.svg" alt="SecureSpace" />
    <img class="light-only" src="assets/logo-dark.svg" alt="SecureSpace" />
    <h1><span class="dot">·</span> Call Directory</h1>
  </div>
  <div class="search"><input id="q" placeholder="Search store, person, email, phone, state…" autofocus /></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="stores">Stores</button>
    <button class="tab-btn" data-tab="org">Org Chart</button>
    <button class="tab-btn" data-tab="corp">Corporate</button>
    <button class="tab-btn" data-tab="manage" id="tab-manage">Manage</button>
  </div>
  <span class="role-pill" title="Demo role switcher — production reads from SSO">
    <span class="role-dot" id="roleDot"></span>
    <select id="roleSel">
      <option value="viewer">Viewer</option>
      <option value="power">Power User</option>
      <option value="admin">Admin</option>
    </select>
  </span>
  <button class="theme-toggle" id="themeBtn" title="Toggle theme">◐</button>
</header>
<main>
  <aside class="sidebar" id="sidebar"></aside>
  <section class="content" id="content"><div class="empty">Select a store from the left, or start typing to search.</div></section>
</main>
<div class="modal-backdrop" id="modal"><div class="modal">
  <div class="modal-head"><h3 id="modalTitle">Edit</h3><button class="close" id="modalClose">×</button></div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-foot" id="modalFoot"></div>
</div></div>

<script>
let STORES=[], CORP={}, PEOPLE=[];
let currentTab='stores';
let selectedStore=null;
const collapsedGroups=new Set();   // sidebar groups
const collapsedSections=new Set(); // profile sections (sticky via id)

async function load() {
  const [s,c,p] = await Promise.all([
    fetch('data/stores.json').then(r=>r.json()),
    fetch('data/corporate.json').then(r=>r.json()),
    fetch('data/people.json').then(r=>r.json()),
  ]);
  STORES=s; CORP=c; PEOPLE=p;
  renderSidebar();
}

const initials = n => (n||'??').split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();

function matchStore(s,q){
  if(!q) return true;
  q=q.toLowerCase();
  const hay=[s.code,s.name,s.state,s.timezone,s.store_email,s.store_office_phone,s.store_cell_phone,s.address,
    ...s.staff.map(p=>p.name+' '+p.email+' '+p.phone),
    ...s.supervisors.map(p=>p.name+' '+p.email+' '+p.phone)].join(' ').toLowerCase();
  return hay.includes(q);
}

function renderSidebar(){
  const q=document.getElementById('q').value.trim();
  const side=document.getElementById('sidebar');
  if(currentTab==='stores'){
    const byState={};
    STORES.filter(s=>matchStore(s,q)).forEach(s=>{
      (byState[s.state||'—']=byState[s.state||'—']||[]).push(s);
    });
    const toolbar=`<div class="toolbar">
      <span class="label">${Object.keys(byState).length} states · ${STORES.filter(s=>matchStore(s,q)).length} stores</span>
      <div class="actions">
        <button class="mini-btn" id="sb-expand">Expand all</button>
        <button class="mini-btn" id="sb-collapse">Collapse all</button>
      </div></div>`;
    side.innerHTML=toolbar+Object.keys(byState).sort().map(st=>{
      const isCollapsed=collapsedGroups.has('state:'+st);
      return `<div>
        <div class="group ${isCollapsed?'collapsed':''}" data-group="state:${st}">
          <div class="group-header"><span><span class="chev">▾</span> ${st}</span><span class="group-count">${byState[st].length}</span></div>
        </div>
        <div class="group-body">
          ${byState[st].map(s=>`
            <div class="row ${selectedStore===s.code?'active':''}" data-code="${s.code}">
              <div><div>${s.name}</div><div class="meta">${s.timezone||''}</div></div>
              <div class="code">${s.code}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');

  return `<div class="${cls.join(' ')}" style="position:relative">
    ${editBtn?`<div style="position:absolute;top:6px;right:6px">${editBtn}</div>`:''}
    <div class="avatar">${initials(p.name)}</div>

function section(id,title,count,bodyHtml,defaultOpen=true){

}

function renderOrg(){
  const roleSet=rx=>{const seen=new Set(),list=[];
    STORES.forEach(s=>s.supervisors.concat(s.staff).forEach(p=>{
      if(rx.test(p.role)&&p.name&&!seen.has(p.name)){seen.add(p.name);list.push({...p,stores:[]});}
    }));
    list.forEach(x=>{x.stores=STORES.filter(s=>[...s.supervisors,...s.staff].some(p=>p.name===x.name)).map(s=>s.code);});
    return list;
  };
  const regionals=roleSet(/regional/i);
  const dms=roleSet(/^dm$|district manager/i);
  const ams=roleSet(/^am$|area manager/i);
  const msms=roleSet(/multi[- ]?store/i);
  const tier=(id,title,arr,openDefault=true)=>{
    const open=openDefault&&!collapsedSections.has(id);
    return `<details class="tier" data-sid="${id}" ${open?'open':''}>
      <summary><h3><span class="chev">▸</span> ${title}</h3><span class="count" style="color:var(--muted);font-family:'DM Mono',monospace;font-size:12px">${arr.length}</span></summary>
      <div class="tier-body"><div class="nodes">${arr.map(p=>`<div class="node">${p.name}<span class="sm">· ${p.stores.length} store${p.stores.length===1?'':'s'}</span></div>`).join('')||'<div class="empty" style="margin-top:0">None</div>'}</div></div>
    </details>`;
  };
  document.getElementById('content').innerHTML=`
    <div class="profile-toolbar">
      <button class="mini-btn" data-profile-action="expand">Expand all</button>
      <button class="mini-btn" data-profile-action="collapse">Collapse all</button>
    </div>
    <div class="org">
    ${tier('t-reg','Regional Managers',regionals)}
    ${tier('t-dm','District Managers',dms)}
    ${tier('t-am','Area Managers',ams)}
    ${tier('t-msm','Multi-Store Managers',msms)}
  </div>`;
  bindDetailsToggles(document.getElementById('content'));
}

function bindDetailsToggles(root){
  root.querySelectorAll('details[data-sid]').forEach(d=>{
    d.addEventListener('toggle',()=>{
      const id=d.dataset.sid;
      if(d.open) collapsedSections.delete(id); else collapsedSections.add(id);
    });
  });
  root.querySelectorAll('[data-profile-action]').forEach(b=>{
    b.onclick=()=>{
      const act=b.dataset.profileAction;
      root.querySelectorAll('details[data-sid]').forEach(d=>{
        d.open=(act==='expand');
        const id=d.dataset.sid;
        if(act==='expand') collapsedSections.delete(id); else collapsedSections.add(id);
      });
    };
  });
}

/* ─── Add Facility — guided form mirroring existing facility shape ─── */
function profileFacilities(){
  const states=[...new Set(STORES.map(s=>s.state).filter(Boolean))].sort();
  const tzs=[...new Set(STORES.map(s=>s.timezone).filter(Boolean))].sort();
  const staffRoles=[...new Set(STORES.flatMap(s=>s.staff.map(p=>p.role)).filter(Boolean))].sort();
  const supRoles=[...new Set(STORES.flatMap(s=>s.supervisors.map(p=>p.role)).filter(Boolean))].sort();
  const repRoles=[...new Set(STORES.map(s=>s.account_rep&&s.account_rep.role).filter(Boolean))].sort();
  const nums=STORES.map(s=>s.code).map(c=>{const m=/^L0*(\d+)$/.exec(c||'');return m?parseInt(m[1],10):null;}).filter(n=>n!=null);
  const nextNum=(nums.length?Math.max(...nums)+1:1);
  const nextCode='L'+String(nextNum).padStart(3,'0');
  return {states,tzs,staffRoles,supRoles,repRoles,nextCode};
}
function personRow(kind,p){
  p=p||{};
  const listId=kind==='staff'?'af-staff-roles':kind==='sup'?'af-sup-roles':'af-rep-roles';
  return `<div class="af-prow" data-kind="${kind}" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 24px;gap:6px;margin-bottom:6px;align-items:center">
    <input placeholder="Name" data-f="name" value="${(p.name||'').replace(/"/g,'&quot;')}" style="padding:6px 8px;background:var(--card);border:1px solid var(--border-color);border-radius:4px;color:var(--text);font-size:12px;outline:none" />
    <input placeholder="Role" list="${listId}" data-f="role" value="${(p.role||'').replace(/"/g,'&quot;')}" style="padding:6px 8px;background:var(--card);border:1px solid var(--border-color);border-radius:4px;color:var(--text);font-size:12px;outline:none" />
    <input placeholder="Phone" data-f="phone" value="${(p.phone||'').replace(/"/g,'&quot;')}" style="padding:6px 8px;background:var(--card);border:1px solid var(--border-color);border-radius:4px;color:var(--text);font-size:12px;outline:none" />
    <input placeholder="Email" data-f="email" value="${(p.email||'').replace(/"/g,'&quot;')}" style="padding:6px 8px;background:var(--card);border:1px solid var(--border-color);border-radius:4px;color:var(--text);font-size:12px;outline:none" />
    <button type="button" class="af-rm" title="Remove" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0">×</button>
  </div>`;
}
function openAddFacility(){
  const {states,tzs,staffRoles,supRoles,repRoles,nextCode}=profileFacilities();
  const sectionH=(t,sub)=>`<h4 style="margin:18px 0 10px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700">${t}${sub?` <span style="text-transform:none;font-weight:400;letter-spacing:0;color:var(--muted-dark)">${sub}</span>`:''}</h4>`;
  openModal('Add New Facility',
    `<div style="color:var(--muted);font-size:12px;margin-bottom:14px;padding:10px 12px;background:var(--primary-dim);border:1px solid var(--primary);border-radius:6px">
       Portfolio profile: <b style="color:var(--text)">${STORES.length}</b> facilities across <b style="color:var(--text)">${states.length}</b> states. Fields below mirror the existing schema — required fields marked <b style="color:var(--text)">*</b>.
     </div>
     ${sectionH('Identity')}
     <div class="form-row"><label>Facility Code *</label><input id="af-code" value="${nextCode}" placeholder="L###" /></div>
     <div class="form-row"><label>Facility Name *</label><input id="af-name" placeholder="e.g. Titusville" /></div>
     <div class="form-row"><label>State *</label><input id="af-state" list="af-states" placeholder="2-letter, e.g. FL" maxlength="2" style="text-transform:uppercase" /></div>
     <div class="form-row"><label>Timezone</label><input id="af-tz" list="af-tzs" placeholder="EST / CST / MST / PST" /></div>
     <div class="form-row"><label>Address</label><input id="af-address" placeholder="123 Main St, City, ST 00000" /></div>
     <datalist id="af-states">${states.map(s=>`<option value="${s}">`).join('')}</datalist>
     <datalist id="af-tzs">${tzs.map(t=>`<option value="${t}">`).join('')}</datalist>

     ${sectionH('Hours','one line per day; copy format from existing records')}
     <div class="form-row" style="align-items:flex-start"><label>Manager Hours</label>
       <textarea id="af-hours" placeholder="Mon-Fri 9:30am-6pm&#10;Sat 10am-4:00pm&#10;Closed Sun"></textarea></div>

     ${sectionH('Contact')}
     <div class="form-row"><label>Store Email</label><input id="af-email" placeholder="cityname@securespace.com" /></div>
     <div class="form-row"><label>Office Phone</label><input id="af-office" placeholder="555-555-5555" /></div>
     <div class="form-row"><label>Cell Phone</label><input id="af-cell" placeholder="555-555-5555" /></div>
     <div class="form-row"><label>Computers Onsite</label><input id="af-comps" placeholder="2" /></div>

     ${sectionH('Store Team','typically Store Manager + Assistant Store Manager')}
     <div id="af-staff-wrap"></div>
     <button type="button" class="btn" id="af-staff-add" style="padding:6px 12px;font-size:12px;margin-top:2px">+ Add Staff Member</button>
     <datalist id="af-staff-roles">${staffRoles.map(r=>`<option value="${r}">`).join('')}</datalist>

     ${sectionH('Escalation · Supervisors','typically AM, DM, Regional Manager')}
     <div id="af-sup-wrap"></div>
     <button type="button" class="btn" id="af-sup-add" style="padding:6px 12px;font-size:12px;margin-top:2px">+ Add Supervisor</button>
     <datalist id="af-sup-roles">${supRoles.map(r=>`<option value="${r}">`).join('')}</datalist>

     ${sectionH('Account Representative','optional — leave blank if none')}
     <div id="af-rep-wrap"></div>
     <datalist id="af-rep-roles">${repRoles.map(r=>`<option value="${r}">`).join('')}</datalist>

     <div id="af-errors" style="color:var(--red);font-size:12px;margin-top:14px;min-height:14px"></div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn" id="af-preview">Preview</button>
     <button class="btn primary" id="af-save">Save Facility</button>`);

  const staffWrap=document.getElementById('af-staff-wrap');
  const supWrap=document.getElementById('af-sup-wrap');
  const repWrap=document.getElementById('af-rep-wrap');
  staffWrap.innerHTML=personRow('staff',{role:'Store Manager'})+personRow('staff',{role:'Assistant Store Manager'});
  supWrap.innerHTML=personRow('sup',{role:'AM'})+personRow('sup',{role:'DM'});
  repWrap.innerHTML=personRow('rep',{role:'Account Representative'});

  function bindRemovers(){
    document.querySelectorAll('.af-rm').forEach(b=>b.onclick=()=>{
      const row=b.closest('.af-prow');
      const wrap=row.parentElement;
      if(wrap.children.length<=1 && wrap!==repWrap) return;
      row.remove();
    });
  }
  bindRemovers();
  document.getElementById('af-staff-add').onclick=()=>{staffWrap.insertAdjacentHTML('beforeend',personRow('staff'));bindRemovers();};
  document.getElementById('af-sup-add').onclick=()=>{supWrap.insertAdjacentHTML('beforeend',personRow('sup'));bindRemovers();};

  const nameInput=document.getElementById('af-name');
  const emailInput=document.getElementById('af-email');
  nameInput.addEventListener('input',()=>{
    if(emailInput.dataset.touched) return;
    const slug=(nameInput.value||'').toLowerCase().replace(/[^a-z0-9]+/g,'');
    emailInput.placeholder=slug?`${slug}@securespace.com`:'cityname@securespace.com';
  });
  emailInput.addEventListener('input',()=>{emailInput.dataset.touched='1';});
  const stateInput=document.getElementById('af-state');
  stateInput.addEventListener('input',()=>{stateInput.value=stateInput.value.toUpperCase();});

  function collectPeople(wrap){
    return [...wrap.querySelectorAll('.af-prow')].map(r=>({
      name:r.querySelector('[data-f=name]').value.trim(),
      role:r.querySelector('[data-f=role]').value.trim(),
      store_code_ref:'',
      phone:r.querySelector('[data-f=phone]').value.trim(),
      email:r.querySelector('[data-f=email]').value.trim(),
    })).filter(p=>p.name||p.role||p.phone||p.email);
  }
  function collectStore(){
    const rep=collectPeople(repWrap)[0]||null;
    return {
      code:document.getElementById('af-code').value.trim(),
      name:document.getElementById('af-name').value.trim(),
      state:document.getElementById('af-state').value.trim().toUpperCase(),
      timezone:document.getElementById('af-tz').value.trim(),
      address:document.getElementById('af-address').value.trim(),
      hours_raw:document.getElementById('af-hours').value.trim(),
      store_email:document.getElementById('af-email').value.trim(),
      store_office_phone:document.getElementById('af-office').value.trim(),
      store_cell_phone:document.getElementById('af-cell').value.trim(),
      computers_onsite:document.getElementById('af-comps').value.trim(),
      staff:collectPeople(staffWrap),
      supervisors:collectPeople(supWrap),
      account_rep:rep,
    };
  }
  function validate(s){
    const errs=[];
    if(!s.code) errs.push('Facility code is required');
    else if(STORES.some(x=>x.code.toLowerCase()===s.code.toLowerCase())) errs.push(`Code "${s.code}" already exists`);
    if(!s.name) errs.push('Facility name is required');
    if(!s.state) errs.push('State is required');
    return errs;
  }

  document.getElementById('af-preview').onclick=()=>{
    const s=collectStore(); const errs=validate(s);
    const err=document.getElementById('af-errors');
    if(errs.length){ err.innerHTML=errs.map(e=>'• '+e).join('<br>'); return; }
    err.innerHTML='';
    const pretty=JSON.stringify(s,null,2);
    openModal('Preview — '+s.name+' ('+s.code+')',
      `<div style="color:var(--muted);font-size:12px;margin-bottom:10px">This is the JSON record that will be appended to <code style="color:var(--info)">stores.json</code>.</div>
       <pre style="background:var(--card);border:1px solid var(--border-color);border-radius:6px;padding:12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text);overflow:auto;max-height:45vh;margin:0">${pretty.replace(/</g,'&lt;')}</pre>`,
      `<button class="btn" onclick="closeModal()">Back</button>
       <button class="btn primary" id="af-preview-save">Confirm & Save</button>`);
    document.getElementById('af-preview-save').onclick=()=>commitFacility(s);
  };
  document.getElementById('af-save').onclick=()=>{
    const s=collectStore(); const errs=validate(s);
    const err=document.getElementById('af-errors');
    if(errs.length){ err.innerHTML=errs.map(e=>'• '+e).join('<br>'); return; }
    err.innerHTML=''; commitFacility(s);
  };
}
function commitFacility(s){
  STORES.push(s);
  const pretty=JSON.stringify(STORES,null,2);
  const blob=new Blob([pretty],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  openModal('Facility Added — '+s.name,
    `<div style="color:var(--cta);font-size:13px;margin-bottom:14px;padding:10px 12px;background:var(--cta-dim);border:1px solid var(--cta);border-radius:6px">
       ✓ <b>${s.name}</b> (${s.code}) added in-memory. It now appears under <b>${s.state||'—'}</b> in the sidebar.
     </div>
     <div style="color:var(--muted);font-size:12px;line-height:1.55">
       This demo writes to an in-memory copy of the directory. To persist the change across reloads, download the updated <code style="color:var(--info);font-family:'DM Mono',monospace">stores.json</code> below and commit it to the repo at
       <code style="color:var(--info);font-family:'DM Mono',monospace;display:block;margin-top:4px;word-break:break-all">public/_static/call-directory/data/stores.json</code>
     </div>
     <div style="margin-top:14px;font-size:12px;color:var(--muted)">In production this will POST to <code style="color:var(--info)">/api/facilities</code> and write to the audit log under your user ID.</div>`,
    `<a class="btn" href="${url}" download="stores.json">⬇ Download stores.json</a>
     <button class="btn primary" onclick="closeModal();currentTab='stores';document.querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x.dataset.tab==='stores'));selectedStore='${s.code}';renderSidebar();">View Facility</button>`);
}
window.openAddFacility=openAddFacility;

/* ─── Inline edit on person cards (added to existing render) ─── */
function editPerson(name){
  if(denyViewer('edit person records')) return;
  openModal('Edit Person — '+name,`
    <div class="form-row"><label>Name</label><input id="ep-name" value="${name}" /></div>
    <div class="form-row"><label>Email</label><input id="ep-email" /></div>
    <div class="form-row"><label>Phone</label><input id="ep-phone" /></div>
    <div class="form-row"><label>Status</label><select id="ep-status"><option>Active</option><option>On Leave</option><option>Do Not Contact</option><option>Terminated</option></select></div>
    <div class="form-row" style="align-items:flex-start"><label>Notes</label><textarea placeholder="e.g. 'On leave until 2026-06-01'"></textarea></div>`,
    `<button class="btn danger" onclick="alert('Prototype: would soft-delete with confirmation');closeModal()">Mark Terminated</button>
     <button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn primary" onclick="alert('Prototype: would POST /api/people/upsert');closeModal()">Save</button>`);
}
window.editPerson=editPerson;

document.getElementById('q').addEventListener('input',renderSidebar);
document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{
  if(b.dataset.tab==='manage' && !canEdit()){ alert('You need Power User or Admin permissions for this section.'); return; }
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); currentTab=b.dataset.tab;
  document.getElementById('content').innerHTML='';
  if(currentTab==='manage'){ renderManage(); return; }
  renderSidebar();
});

document.getElementById('themeBtn').onclick=()=>{
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  document.documentElement.setAttribute('data-theme',cur==='dark'?'light':'dark');
};

applyRole();
load();
</script>
</body>
</html>
